name: Scrape Feasibility Test

# Salt teşhis (İş C öncesi): CI datacenter IP + headless Chromium ile Trendyol ürün
# detay sayfası 200 mü 403 mü? Hiçbir şey commit etmez, yalnız manuel tetiklenir.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: pip install playwright

      - name: Install Chromium (with deps)
        run: python -m playwright install --with-deps chromium

      - name: Probe Trendyol product page
        run: python backend/scrape_probe.py
