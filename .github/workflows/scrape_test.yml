name: Scrape Feasibility Test

# Salt teşhis (İş C öncesi): CI datacenter IP + headless Chromium ile Trendyol ürün
# detay sayfası 200 mü 403 mü? Hiçbir şey commit etmez, yalnız manuel tetiklenir.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # scraper ile AYNI ortam (playwright==1.49.0) — tanı temsili olsun
      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('backend/requirements.txt') }}

      - name: Install Chromium (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Probe Trendyol product page
        run: python backend/scrape_probe.py
