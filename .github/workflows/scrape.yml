name: Data Collection
on:
  schedule:
    # HAFTALIK Pazartesi 05:00 UTC (08:00 TR) — yalnız PUAN + YORUM (deg) tazeler
    # (API bunları vermez → Playwright scrape şart, Mac runner residential IP).
    # Fiyat/stok/satış GÜNLÜK analyze.yml'de API'den gelir (bulut). Bu yüzden günlük değil.
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  scrape:
    # SELF-HOSTED Mac runner (residential IP) — Trendyol GitHub Actions datacenter IP'lerini
    # 403 ile engelliyor; Playwright scraping yalnız residential IP'de çalışır. analyze/deploy
    # bulutta kalır (API/build, 403 yok). Runner agent makinede kurulu olmalı.
    runs-on: [self-hosted, macOS]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Mac'te sistem python3 + Playwright zaten kurulu; pip/playwright idempotent (hızlı).
      - name: Install dependencies (idempotent)
        run: |
          python3 -m pip install -r backend/requirements.txt
          python3 -m playwright install chromium

      - name: Run data scraper
        run: python3 backend/scraper.py
        env:
          PYTHONUNBUFFERED: 1
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Commit updated data
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "RoomArt Bot"
          git add data/
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update scraped data [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger BCG analysis
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'analyze.yml',
              ref: 'main'
            })
            console.log('BCG analiz tetiklendi')
