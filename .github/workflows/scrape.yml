name: Data Collection
on:
  schedule:
    # HAFTALIK Pazartesi 05:00 UTC (08:00 TR) — yalnız PUAN + YORUM (deg) tazeler
    # (API bunları vermez → Playwright scrape şart, Mac runner residential IP).
    # Fiyat/stok/satış GÜNLÜK analyze.yml'de API'den gelir (bulut). Bu yüzden günlük değil.
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  scrape:
    # SELF-HOSTED Mac runner (residential IP) — Trendyol GitHub Actions datacenter IP'lerini
    # 403 ile engelliyor; Playwright scraping yalnız residential IP'de çalışır. analyze/deploy
    # bulutta kalır (API/build, 403 yok). Runner agent makinede kurulu olmalı.
    runs-on: [self-hosted, macOS]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Mac'te sistem python3 + Playwright zaten kurulu; pip/playwright idempotent (hızlı).
      - name: Install dependencies (idempotent)
        run: |
          python3 -m pip install -r backend/requirements.txt
          python3 -m playwright install chromium

      - name: Run data scraper
        run: python3 backend/scraper.py
        env:
          PYTHONUNBUFFERED: 1
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Fetch Google Trends (6 kategori, TR)
        run: python3 backend/trends_fetch.py
        env:
          PYTHONUNBUFFERED: 1
        continue-on-error: true   # Trends API geçici hata verirse scrape'i durdurmasın

      # Kendi ürünlerimizin n11 (SEPETTE) + Trendyol (kampanya) SON fiyatı — müşterinin ödeyeceği.
      # Satıcı API'leri platform kampanya/sepet fiyatını VERMEZ → yalnız ürün sayfası scrape'i.
      # SIRALI + kibar aralık (eşzamanlı/hızlı istek IP'yi throttle'lar). product_registry_public.json
      # URL'lerini okur → data/own_final_prices.json. HB dahil değil (Akamai 403). RS zaten API'den.
      - name: Scrape own final prices (n11 sepette + TY kampanya)
        run: python3 backend/own_price_scraper.py --verbose
        env:
          PYTHONUNBUFFERED: 1
        continue-on-error: true   # scrape engellenir/uzarsa haftalık akışı durdurmasın

      - name: Commit updated data
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "RoomArt Bot"
          git add data/
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update scraped data [skip ci]"
            # analyze.yml aynı anda main'e push edebilir → non-fast-forward.
            # Scrape 40+ dk sürdüğü için yarış kaçınılmaz: rebase edip yeniden dene.
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin main || exit 1
            done
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger BCG analysis
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'analyze.yml',
              ref: 'main'
            })
            console.log('BCG analiz tetiklendi')
