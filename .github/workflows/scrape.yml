name: Data Collection
on:
  schedule:
    - cron: '0 5 * * *'        # 05:00 UTC = 08:00 TR, her sabah
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Install Chromium (Playwright)
        run: python -m playwright install --with-deps chromium

      - name: Run data scraper
        run: python backend/scraper.py
        env:
          PYTHONUNBUFFERED: 1
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Commit updated data
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "RoomArt Bot"
          git add data/
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update scraped data [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger BCG analysis
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'analyze.yml',
              ref: 'main'
            })
            console.log('BCG analiz tetiklendi')
