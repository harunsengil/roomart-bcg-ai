name: Data Collection
on:
  schedule:
    - cron: '0 5 * * *'        # 05:00 UTC = 08:00 TR, her sabah
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  scrape:
    # BULUT (ubuntu) — Trendyol basit HTTP'yi (requests) 403'ler AMA Playwright (gerçek
    # tarayıcı) ile bulut IP'sinden 200 + veri döner (2026-06-17 probe ile doğrulandı).
    # scraper.py Playwright kullanır → datacenter IP engeli aşılır, Mac runner gerekmez.
    # 403 rate-limit riskine karşı scraper'ın %başarı eşiği var (düşükse görünür uyarı).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Playwright Chromium'u sürüm-anahtarlı cache'le (ci-resource-efficiency) → cache-hit'te indirme yok.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium

      - name: Install dependencies
        run: |
          python3 -m pip install -r backend/requirements.txt
          python3 -m playwright install --with-deps chromium

      - name: Run data scraper
        run: python3 backend/scraper.py
        env:
          PYTHONUNBUFFERED: 1
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Commit updated data
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "RoomArt Bot"
          git add data/
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update scraped data [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger BCG analysis
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'analyze.yml',
              ref: 'main'
            })
            console.log('BCG analiz tetiklendi')
