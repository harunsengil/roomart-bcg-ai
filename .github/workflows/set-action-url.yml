name: Set Firebase Action URL

# Tek seferlik: Firebase Auth custom action URL'yi API'den ayarlar (Console bug'ını atlar).
# Parola sıfırlama linkleri https://harunsengil.github.io/roomart-bcg-ai/ 'e yönlenir.
on:
  workflow_dispatch:

jobs:
  set-url:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-auth

      - name: Set custom action URL
        run: python backend/set_action_url.py
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
