name: BCG Analysis

on:
  schedule:
    # GÜNLÜK 05:30 UTC (08:30 TR) — bulutta API sync (fiyat/stok/satış/sinyaller TAZE).
    # Kendi ürün verisi resmî Trendyol API'den gelir (403 yok); Mac GEREKMEZ.
    # Puan/yorum (deg) yalnız haftalık Mac scrape ile tazelenir (API vermez).
    - cron: '30 5 * * *'
  push:
    paths:
      - 'data/snapshots.json'
      - 'data/trends_sonuc.json'
      - 'data/category_map.json'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      # Kendi mağaza satışını Trendyol API'den çek (data/trendyol_sales.json, gitignored).
      # analyzer bunu okuyup pazar payını GERÇEK satışa bağlar. Secret yoksa veya hata
      # olursa build kırılmaz; analyzer otomatik deg (yorum) tabanına düşer.
      - name: Sync Trendyol sales (own store)
        run: python backend/trendyol_sync.py
        continue-on-error: true
        env:
          TRENDYOL_SUPPLIER_ID: ${{ secrets.TRENDYOL_SUPPLIER_ID }}
          TRENDYOL_TOKEN: ${{ secrets.TRENDYOL_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Sessiz düşüşü görünür kıl: secret VARSA ama satış dosyası üretilmediyse uyar
      # (token rotasyon sonrası bayatlamış olabilir → pazar payı sessizce deg'e döner).
      - name: Verify Trendyol sync
        env:
          TRENDYOL_TOKEN: ${{ secrets.TRENDYOL_TOKEN }}
        run: |
          if [ -z "$TRENDYOL_TOKEN" ]; then
            echo "Trendyol secret yok — pazar payı 'reviews' (deg) tabanında (beklenen)."
          elif [ ! -s data/trendyol_sales.json ]; then
            echo "::warning title=Trendyol::Secret VAR ama trendyol_sales.json YOK — pazar payı deg'e düştü (token bayat olabilir; TRENDYOL_TOKEN'ı yenile)."
          else
            echo "✓ trendyol_sales.json hazır ($(wc -c < data/trendyol_sales.json) bayt) — pazar payı GERÇEK SATIŞ tabanında."
          fi

      # ── Çok-platform API sync (Shopify · Judge.me · n11 · Hepsiburada) ──────────
      # Hepsi continue-on-error: secret yoksa veya API hata verirse GÜNLÜK BCG akışı
      # KIRILMAZ (o platform o gün atlanır, eski verisi korunur). Kendi ürün
      # fiyat/satış/yorumu her sabah tazelenir → dashboard platform kolonları güncel.
      - name: Sync Shopify (own store)
        run: python backend/shopify_sync.py
        continue-on-error: true
        env:
          SHOPIFY_STORE_URL:     ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_CLIENT_ID:     ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}

      # Judge.me yorumları shopify_sales.json'daki handle→sku köprüsüne bağlı → Shopify'dan SONRA.
      # Mevcut platform_reviews.json'u okuyup n11 yorumlarını KORUR (yalnız shopify'ı tazeler).
      - name: Sync Judge.me reviews (Shopify)
        run: python backend/judgeme_sync.py
        continue-on-error: true
        env:
          JUDGEME_SHOP_DOMAIN: ${{ secrets.JUDGEME_SHOP_DOMAIN }}
          JUDGEME_API_TOKEN:   ${{ secrets.JUDGEME_API_TOKEN }}

      - name: Sync n11 (own store)
        run: python backend/n11_sync.py
        continue-on-error: true
        env:
          N11_APP_KEY:    ${{ secrets.N11_APP_KEY }}
          N11_APP_SECRET: ${{ secrets.N11_APP_SECRET }}

      - name: Sync Hepsiburada (own store)
        run: python backend/hepsiburada_sync.py
        continue-on-error: true
        env:
          HB_MERCHANT_ID: ${{ secrets.HB_MERCHANT_ID }}
          HB_USERNAME:    ${{ secrets.HB_USERNAME }}
          HB_PASSWORD:    ${{ secrets.HB_PASSWORD }}
          HB_USER_AGENT:  ${{ secrets.HB_USER_AGENT }}

      - name: Run BCG analysis engine
        run: python backend/analyzer.py
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Rakip rekabet analizi: competitor_snapshots.json VARSA competitive.json üretir (yoksa atlar).
      # bcg_scores.json'a bağımlı → BCG analizinden SONRA. BCG akışını bozmaz.
      - name: Run competitor analysis (varsa)
        run: python backend/competitor_analyzer.py
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Çok-platform ürün kütüğü: stok kodunda birleştir → product_registry_public.json
      # (dashboard platform fiyat/yorum kolonları). Tüm sync'lerden SONRA çalışır.
      # Firestore'a YALNIZ public-safe (ciro'suz) payload yazılır (dashboard-bağlı proje).
      - name: Build product registry (stok kodunda birleştir)
        run: python backend/registry_builder.py
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # GÜVENLİK: gerçek satış/ciro + tam kütük + görsel hash public frontend'e KOPYALANMAZ.
      - name: Copy data to frontend public (satış + kütük + hash hariç)
        run: |
          cp data/*.json frontend/public/data/
          # Gerçek satış/ciro (her platform) + tam kütük (ciro'lu) + görsel hash → public'e GİTMEZ
          rm -f frontend/public/data/trendyol_sales.json
          rm -f frontend/public/data/shopify_sales.json
          rm -f frontend/public/data/n11_sales.json
          rm -f frontend/public/data/hb_sales.json
          rm -f frontend/public/data/product_registry.json
          rm -f frontend/public/data/image_hashes.json
          rm -f frontend/public/data/image_embeddings.json
          rm -f frontend/public/data/competitor_snapshots.json
          # GÜVENLİK GARANTI: hiçbir satış/ciro dosyası public olmayacak
          for f in trendyol_sales shopify_sales n11_sales hb_sales product_registry; do
            if [ -f "frontend/public/data/$f.json" ]; then
              echo "CRITICAL: $f.json public/data'ya sızdı!" && exit 1
            fi
          done

      - name: Commit analysis results
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "RoomArt Bot"
          git add data/ frontend/public/data/
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update BCG analysis scores [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger dashboard deploy
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            })
            console.log('Dashboard deploy tetiklendi')
