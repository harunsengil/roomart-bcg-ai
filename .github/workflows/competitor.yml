name: Competitor Scrape
on:
  schedule:
    - cron: '0 6 * * 1'        # Pazartesi 06:00 UTC = 09:00 TR (HAFTALIK — rakip verisi yavaş değişir)
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  competitor:
    # SELF-HOSTED Mac runner (residential IP) — Trendyol GitHub datacenter IP'lerini 403'le engelliyor.
    runs-on: [self-hosted, macOS]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (idempotent)
        run: |
          python3 -m pip install -r backend/requirements.txt
          python3 -m playwright install chromium

      # REFRESH modu: bilinen rakip ürün URL'lerini (seed) gezip fiyat/puan/yorum tazeler
      # (residential IP'de 403 yok). Seed'i `collect` modu üretir; CI listeleme YAPMAZ.
      - name: Refresh competitor products (seed-refresh)
        run: python3 backend/competitor_bot.py refresh
        env:
          PYTHONUNBUFFERED: 1

      - name: Commit competitor snapshots
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "RoomArt Bot"
          git add data/competitor_snapshots.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update competitor snapshots [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Rakip verisi tazelenince BCG analizini tetikle (PR-B'de competitor_analyzer adımı bunu kullanır).
      - name: Trigger BCG analysis
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'analyze.yml',
              ref: 'main'
            })
            console.log('BCG analiz tetiklendi (rakip verisi güncellendi)')
