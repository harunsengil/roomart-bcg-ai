name: Competitor Scrape
on:
  schedule:
    - cron: '0 6 * * 1'        # Pazartesi 06:00 UTC = 09:00 TR (HAFTALIK — rakip verisi yavaş değişir)
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  competitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      # Playwright tarayıcı binary'leri (scrape.yml ile aynı sürüm-anahtarlı cache → tekrar indirme yok).
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('backend/requirements.txt') }}

      - name: Install Chromium (cache miss → tarayıcı + sistem bağımlılıkları)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit → yalnız apt)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      # REFRESH modu: bilinen rakip ürün URL'lerini (seed) gezip fiyat/puan/yorum tazeler.
      # Ürün-detay sayfaları server-render → CI'da bot-korumasına TAKILMAZ (scrape.yml ile aynı).
      # Seed'i `collect` modu (yerel/residential) üretir; CI listeleme YAPMAZ.
      - name: Refresh competitor products (seed-refresh, scrape.yml deseni)
        run: python backend/competitor_bot.py refresh
        env:
          PYTHONUNBUFFERED: 1

      - name: Commit competitor snapshots
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "RoomArt Bot"
          git add data/competitor_snapshots.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update competitor snapshots [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Rakip verisi tazelenince BCG analizini tetikle (PR-B'de competitor_analyzer adımı bunu kullanır).
      - name: Trigger BCG analysis
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'analyze.yml',
              ref: 'main'
            })
            console.log('BCG analiz tetiklendi (rakip verisi güncellendi)')
